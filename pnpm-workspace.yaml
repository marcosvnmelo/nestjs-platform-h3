# cspell:disable
packages:
  - packages/*
  - tests/*
  - tests/nest-application/*
  - tools/*
allowBuilds:
  '@apollo/protobufjs': false
  '@confluentinc/kafka-javascript': true
  '@nestjs/core': false
  core-js: false
  cpu-features: false
  esbuild: false
  protobufjs: false
  ssh2: false

catalog:
  # Core framework

  # Utilities

  # Dev dependencies
  '@apollo/server': '5.5.1'
  '@as-integrations/express5': '1.1.2'
  '@confluentinc/kafka-javascript': '1.9.0'
  '@fastify/busboy': '3.2.0'
  '@grpc/grpc-js': '1.14.4'
  '@grpc/proto-loader': '0.8.1'
  '@nestjs/apollo': '13.4.2'
  '@nestjs/common': '11.1.24'
  '@nestjs/core': '11.1.24'
  '@nestjs/graphql': '13.4.2'
  '@nestjs/mapped-types': '2.1.1'
  '@nestjs/microservices': '11.1.24'
  '@nestjs/mongoose': '11.0.4'
  '@nestjs/platform-express': '11.1.24'
  '@nestjs/platform-fastify': '11.1.24'
  '@nestjs/platform-socket.io': '11.1.24'
  '@nestjs/platform-ws': '11.1.24'
  '@nestjs/testing': '11.1.24'
  '@nestjs/typeorm': '11.0.1'
  '@nestjs/websockets': '11.1.24'

  # Build tools
  '@rslib/core': '0.22.0'
  '@rstest/adapter-rslib': '0.10.3'
  '@rstest/core': '0.10.3'
  '@testcontainers/kafka': '12.0.1'
  '@testcontainers/nats': '12.0.1'
  '@types/amqplib': '0.10.8'
  '@types/autocannon': '7.12.7'
  '@types/body-parser': 1.19.6
  '@types/content-type': ^1.1.9
  '@types/express': '5.0.6'
  '@types/mime-types': ^3.0.1
  '@types/node': '25.9.1'
  '@types/supertest': '7.2.0'
  '@types/ws': '8.18.1'
  amqp-connection-manager: '5.0.0'
  amqplib: '2.0.1'
  autocannon: '8.0.0'

  # HTTP servers
  body-parser: 2.2.2
  class-transformer: '0.5.1'
  class-validator: '0.15.1'
  content-type: '^1.0.5'
  eventsource: '4.1.0'
  express: '5.2.1'
  fastify: '5.8.5'
  graphql: '16.14.0'
  graphql-subscriptions: '3.0.0'
  h3: '2.0.1-rc.22'
  ioredis: '5.9.3'
  jiti: '2.6.1'
  kafkajs: '2.2.4'
  mime-types: ^3.0.2
  mongoose: '9.6.2'
  mqtt: '5.15.1'
  mysql2: '3.22.3'
  nats: '2.29.3'
  path-to-regexp: '8.4.2'
  reflect-metadata: '^0.2.2'
  rxjs: '7.8.2'
  socket.io: '4.8.3'
  socket.io-client: '4.8.3'
  srvx: ^0.11.16
  supertest: '^7.2.2'
  testcontainers: '12.0.1'
  typeorm: '0.3.30'
  typescript: '5.9.3'
  ws: '8.21.0'
overrides:
  '@apollo/server': '$@apollo/server'
  '@nestjs/common': '$@nestjs/common'
  '@nestjs/core': '$@nestjs/core'
  ansis: '4.3.0'
  class-validator: '$class-validator'
  fast-json-stringify: '6.4.0'
patchedDependencies:
  '@nestjs/apollo': patches/@nestjs__apollo.patch
  quick-publish: patches/quick-publish.patch
